name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            APP_DIR="${{ secrets.EC2_APP_DIR || '/home/ubuntu/QRP' }}"
            WEB_ROOT="${{ secrets.EC2_WEB_ROOT || '/var/www/qrp' }}"
            BRANCH="${{ github.ref_name }}"

            cd "$APP_DIR"

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            corepack enable
            corepack prepare pnpm@10.33.4 --activate

            pnpm install --frozen-lockfile
            pnpm --filter @workspace/shared build
            pnpm --filter api build
            pnpm --filter web build

            sudo mkdir -p "$WEB_ROOT"
            sudo rsync -av --delete "$APP_DIR/apps/web/dist/" "$WEB_ROOT/"
            sudo chown -R www-data:www-data "$WEB_ROOT"
            sudo chmod -R 755 "$WEB_ROOT"

            pm2 restart qrp-api || pm2 start "$APP_DIR/apps/api/dist/main.js" --name qrp-api
            pm2 save

            sudo nginx -t
            sudo systemctl reload nginx
